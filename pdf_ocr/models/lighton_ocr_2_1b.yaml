model_id: lightonai/LightOnOCR-2-1B
served_model_name: lighton-ocr

vllm_args:
  limit-mm-per-prompt: '{"image": 1}'
  mm-processor-cache-gb: 4
  enable-chunked-prefill: true
  max-model-len: 4096
  max-num-batched-tokens: 32768
  gpu-memory-utilization: 0.95
  trust-remote-code: true

inference:
  max_tokens: 4000
  temperature: 0.2
  top_p: 0.9
  batch_size: 4
  max_concurrency: 4
  request_timeout: 120
  max_retries: 3
  retry_backoff: 2.0

pdf_rendering:
  dpi: 200
  max_dimension: 1540
