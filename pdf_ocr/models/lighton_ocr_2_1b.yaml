model_id: lightonai/LightOnOCR-2-1B
served_model_name: lighton-ocr

vllm_args:
  limit-mm-per-prompt: '{"image": 1}'
  no-enable-prefix-caching: true
  mm-processor-cache-gb: 0
  enable-chunked-prefill: true
  max-model-len: 4096
  gpu-memory-utilization: 0.90
  trust-remote-code: true

inference:
  max_tokens: 4000
  temperature: 0.2
  top_p: 0.9
  batch_size: 4
  max_concurrency: 64
  request_timeout: 120
  max_retries: 3
  retry_backoff: 2.0
  offline_batch_size: 128
  render_workers: 8
  max_retry_depth: 3
  flush_every: 10

pdf_rendering:
  dpi: 200
  max_dimension: 1540
